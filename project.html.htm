<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Love Calculator 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart-decoration {
            position: absolute;
            font-size: 2rem;
            color: #ff6b9d;
            animation: float 3s ease-in-out infinite;
        }

        .heart-decoration:nth-child(1) { top: -10%; left: 10%; animation-delay: 0s; }
        .heart-decoration:nth-child(2) { top: 5%; right: 15%; animation-delay: 1s; }
        .heart-decoration:nth-child(3) { bottom: 10%; left: 15%; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
            transform: translateY(-2px);
        }

        .input-group i {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6b9d;
        }

        .calculate-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }

        .calculate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 107, 157, 0.4);
        }

        .calculate-btn:active {
            transform: translateY(-1px);
        }

        .calculate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .calculate-btn:hover::before {
            left: 100%;
        }

        .result {
            margin-top: 2rem;
            padding: 2rem;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 20px;
            display: none;
            animation: resultSlide 0.6s ease-out;
        }

        @keyframes resultSlide {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .percentage {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .names-display {
            font-size: 1.3rem;
            color: #666;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .compatibility-bars {
            display: flex;
            justify-content: space-between;
            margin: 2rem 0;
            gap: 1rem;
        }

        .bar-container {
            flex: 1;
            text-align: left;
        }

        .bar-label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #c44569);
            border-radius: 10px;
            transition: width 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .analysis {
            text-align: left;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .share-btn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .loading {
            display: none;
            margin: 1rem 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .percentage {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-heart heart-decoration"></i>
        <i class="fas fa-heart heart-decoration"></i>
        <i class="fas fa-heart heart-decoration"></i>
        
        <h1><i class="fas fa-heart"></i> Love Calculator <i class="fas fa-heart"></i></h1>
        <p class="subtitle">Discover your love compatibility score</p>

        <div class="input-group">
            <input type="text" id="name1" placeholder="Your name" maxlength="20">
            <i class="fas fa-user"></i>
        </div>

        <div class="input-group">
            <input type="text" id="name2" placeholder="Partner's name" maxlength="20">
            <i class="fas fa-user"></i>
        </div>

        <button class="calculate-btn" onclick="calculateLove()">
            <i class="fas fa-magic"></i> Calculate Love Score
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Calculating your love compatibility...</p>
        </div>

        <div class="result" id="result">
            <div class="percentage" id="percentage">85%</div>
            <div class="names-display" id="namesDisplay"></div>
            
            <div class="compatibility-bars">
                <div class="bar-container">
                    <div class="bar-label">Emotional</div>
                    <div class="bar">
                        <div class="bar-fill" id="emotionalBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <div class="bar-label">Physical</div>
                    <div class="bar">
                        <div class="bar-fill" id="physicalBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="analysis" id="analysis">
                Your love connection is truly special! The stars align perfectly for you two.
            </div>

            <button class="share-btn" onclick="shareResult()">
                <i class="fab fa-share-alt"></i> Share Result
            </button>
        </div>
    </div>

    <script>
        function calculateLove() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();
            
            if (!name1 || !name2) {
                alert('Please enter both names! 💕');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.querySelector('.calculate-btn').disabled = true;

            // Simulate calculation delay
            setTimeout(() => {
                const score = getLoveScore(name1, name2);
                displayResult(name1, name2, score);
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.calculate-btn').disabled = false;
            }, 2000);
        }

        function getLoveScore(name1, name2) {
            // Advanced algorithm combining multiple factors
            let score = 0;
            
            // 1. Name length compatibility
            const lengthDiff = Math.abs(name1.length - name2.length);
            score += Math.max(0, 100 - lengthDiff * 10);
            
            // 2. Vowel/consonant balance
            const vowels = 'aeiouAEIOU';
            const v1 = name1.split('').filter(c => vowels.includes(c)).length;
            const v2 = name2.split('').filter(c => vowels.includes(c)).length;
            score += Math.min(50, Math.abs(v1 - v2) * 5 + 25);
            
            // 3. Alphabetical position sum
            const alphaSum1 = name1.split('').reduce((sum, c) => sum + (c.charCodeAt(0) - 64), 0);
            const alphaSum2 = name2.split('').reduce((sum, c) => sum + (c.charCodeAt(0) - 64), 0);
            const alphaDiff = Math.abs(alphaSum1 - alphaSum2);
            score += Math.max(0, 50 - alphaDiff / 2);
            
            // 4. Hash-based magic number
            const hash = (name1 + name2).split('').reduce((a, b) => {
                a = ((a << 5) - a) + b.charCodeAt(0);
                return a & a;
            }, 0);
            score += (Math.abs(hash) % 40);
            
            // 5. Random destiny factor (5-15%)
            score += Math.floor(Math.random() * 11) + 5;
            
            return Math.min(99, Math.max(1, Math.floor(score / 5)));
        }

        function displayResult(name1, name2, score) {
            const result = document.getElementById('result');
            const percentage = document.getElementById('percentage');
            const namesDisplay = document.getElementById('namesDisplay');
            
            // Update display
            namesDisplay.textContent = `${name1} ❤️ ${name2}`;
            percentage.textContent = `${score}%`;
            
            // Emotional and Physical scores
            const emotional = Math.floor(score * 0.6 + Math.random() * 20);
            const physical = Math.floor(score * 0.4 + Math.random() * 20);
            
            document.getElementById('emotionalBar').style.width = `${emotional}%`;
            document.getElementById('physicalBar').style.width = `${physical}%`;
            
            
            const analysis = getAnalysis(score);
            document.getElementById('analysis').innerHTML = analysis;
            
            // Color coding
            percentage.style.background = getScoreGradient(score);
            
            result.style.display = 'block';
        }

        function getAnalysis(score) {
            const analyses = {
                90: "🔥 <strong>Perfect Match!</strong> Your love is written in the stars. This is soulmate territory - cherish it forever! 💍✨",
                80: "💖 <strong>Amazing Compatibility!</strong> You two have incredible chemistry. The universe approves! 🌟",
                70: "💕 <strong>Great Match!</strong> Strong connection with lots of potential. Nurture this beautiful bond! 🌹",
                60: "😊 <strong>Good Compatibility!</strong> Solid foundation with room to grow. Keep working on it! 💪❤️",
                50: "🤝 <strong>Average Match!</strong> There's potential here. Communication is key to making it work! 💬",
                40: "⚠️ <strong>Needs Work!</strong> Challenges ahead, but love conquers all. Try to understand each other better! 🌈",
                30: "😟 <strong>Low Compatibility!</strong> Might be better as friends. Sometimes love needs space to breathe! 👫➡️👬",
                20: "❌ <strong>Not Recommended!</strong> The stars suggest looking elsewhere. Plenty of fish in the sea! 🐟",
                10: "💔 <strong>Run Away!</strong> This match could be toxic. Protect your heart and move on! 🏃‍♀️💨",
                0: "😱 <strong>Disaster!</strong> The universe says NO! Find someone who truly matches your vibe! 🚫"
            };
            
            const range = Object.keys(analyses).sort((a,b) => b-a);
            for (let r of range) {
                if (score >= r) {
                    return analyses[r];
                }
            }
            return analyses[0];
        }

        function getScoreGradient(score) {
            if (score >= 90) return '135deg, #ff6b9d 0%, #c44569 100%';
            if (score >= 80) return '135deg, #ff9a9e 0%, #fecfef 100%';
            if (score >= 70) return '135deg, #a8edea 0%, #fed6e3 100%';
            if (score >= 60) return '135deg, #ffecd2 0%, #fcb69f 100%';
            if (score >= 50) return '135deg, #d299c2 0%, #fef9d7 100%';
            if (score >= 40) return '135deg, #fa709a 0%, #fee140 100%';
            if (score >= 30) return '135deg, #ff9a9e 0%, #fecfef 50%, #ffecd2 100%';
            return '135deg, #ff6b6b 0%, #ee5a52 100%';
        }

        function shareResult() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();
            const score = document.getElementById('percentage').textContent;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Love Calculator Result',
                    text: `${name1} & ${name2}: ${score} compatibility! 💕`,
                    url: window.location.href
                });
            } else {
                const text = `Just checked our love compatibility on Love Calculator! ${name1} ❤️ ${name2} = ${score} 😍 Try it yourself!`;
                navigator.clipboard.writeText(text).then(() => {
                    alert('Result copied to clipboard! 📋');
                });
            }
        }

        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateLove();
            }
        });

      
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^a-zA-Z\s]/g, '');
            });
        });
    </script>
</body>
</html>
